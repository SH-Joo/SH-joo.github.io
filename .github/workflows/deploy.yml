name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Static publish: the approved design (design-draft.html) is the site.
      # No Vite/React build — just assemble index.html + referenced assets.
      - name: Assemble static site
        run: |
          mkdir -p _site/src _site/public
          cp design-draft.html _site/index.html
          cp -r src/images _site/src/images
          cp -r public/. _site/public/
          touch _site/.nojekyll
          ls -R _site | head -n 60

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
